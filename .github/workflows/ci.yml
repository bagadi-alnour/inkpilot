name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --ext .ts,.tsx

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npx tsup

      - name: Check bundle size
        run: |
          SIZE=$(wc -c < dist/index.js)
          echo "ESM bundle size: $SIZE bytes"
          if [ "$SIZE" -gt 200000 ]; then
            echo "Bundle size exceeds 200KB limit!"
            exit 1
          fi
